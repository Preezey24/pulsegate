services:
  redis:
    image: redis:7-alpine
    container_name: pulsegate-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"   # localhost only; never expose dev Redis to LAN
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory-policy noeviction
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

volumes:
  redis-data:
